# Spins up all quickstart-ai-agents services. Run the iii engine on the host first:
#   iii -c iii-config.yaml
#
# Services connect to iii via host.docker.internal. On Linux (Docker <20.10),
# add: extra_hosts: ["host.docker.internal:host-gateway"]

services:
  account-events:
    build:
      context: ./services/account-events
      dockerfile: Dockerfile
    environment:
      III_BRIDGE_URL: ws://host.docker.internal:49134
      LEGACY_SERVICE_URL: http://legacy-service:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  ai-agent:
    build:
      context: ./services/ai-agent
      dockerfile: Dockerfile
    environment:
      III_BRIDGE_URL: ws://host.docker.internal:49134
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  legacy-service:
    build:
      context: ./services/legacy-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
